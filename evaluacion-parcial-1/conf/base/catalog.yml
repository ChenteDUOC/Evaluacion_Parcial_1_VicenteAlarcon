# ===== CAPA 01: RAW (Datos Crudos) =====
ventas_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/ventas.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"

productos_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/productos.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"

clientes_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/clientes.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"

devoluciones_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/devoluciones.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"

# ===== CAPA 02: INTERMEDIATE (Datos Limpios) =====
ventas_cleaned:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/ventas_cleaned.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"
  save_args:
    encoding: "utf-8"
    index: False

productos_cleaned:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/productos_cleaned.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"
  save_args:
    encoding: "utf-8"
    index: False

clientes_cleaned:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/clientes_cleaned.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"
  save_args:
    encoding: "utf-8"
    index: False

devoluciones_cleaned:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/devoluciones_cleaned.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"
  save_args:
    encoding: "utf-8"
    index: False

# ===== CAPA 03: PRIMARY (Datos Integrados) =====
dataset_final:
  type: pandas.CSVDataset
  filepath: data/03_primary/dataset_final.csv
  load_args:
    encoding: "utf-8"
    encoding_errors: "ignore"
  save_args:
    encoding: "utf-8"
    index: False

# ===== CAPA 08: REPORTING =====
reporte_diagnostico:
  type: json.JSONDataset
  filepath: data/08_reporting/reporte_diagnostico.json

reporte_validacion:
  type: json.JSONDataset
  filepath: data/08_reporting/reporte_validacion.json

# ===== CAPA 06: MODELS (Modelos entrenados) =====
modelo_clasificacion:
  type: pickle.PickleDataset
  filepath: data/06_models/mejor_modelo_clasificacion.pkl

modelo_regresion:
  type: pickle.PickleDataset
  filepath: data/06_models/mejor_modelo_regresion.pkl

modelo_clustering:
  type: pickle.PickleDataset
  filepath: data/06_models/modelo_clustering.pkl

# ===== REPORTES DE MODELADO =====
reporte_clasificacion:
  type: json.JSONDataset
  filepath: data/08_reporting/informe_clasificacion.json

reporte_regresion:
  type: json.JSONDataset
  filepath: data/08_reporting/informe_regresion.json

reporte_clustering:
  type: json.JSONDataset
  filepath: data/08_reporting/informe_clustering.json